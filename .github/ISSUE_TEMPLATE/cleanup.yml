name: Cleanup
description: Repository cleanup, refactoring, or maintenance task
title: "[Cleanup]: "
labels: ["cleanup"]
body:
  - type: textarea
    id: task
    attributes:
      label: What should be cleaned up?
      description: Describe the cleanup or maintenance task.
      placeholder: "Example: Remove unused files, simplify folders, rename confusing assets..."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why is this useful?
      description: Explain the benefit of this cleanup.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: List affected files, folders, or repositories if known.
    validations:
      required: false
